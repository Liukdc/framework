<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MetaAgent v5.8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#1a1a2e;color:#eee;height:100dvh;display:flex;flex-direction:column;max-width:600px;margin:0 auto}
header{background:#16213e;padding:10px 16px;border-bottom:1px solid #0f3460;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1em;color:#e94560}
header span{font-size:.75em;color:#888}
#chat{flex:1;overflow-y:auto;padding:12px}
.m{display:flex;margin:6px 0}
.m.u{justify-content:flex-end}
.m .b{padding:9px 12px;border-radius:12px;max-width:85%;line-height:1.4;font-size:.9em}
.m.u .b{background:#e94560;color:#fff;border-bottom-right-radius:4px}
.m.a .b{background:#0f3460;border-bottom-left-radius:4px}
.m .l{font-size:.65em;color:#aaa;margin-bottom:2px}
#bar{display:flex;padding:8px;gap:6px;background:#16213e;border-top:1px solid #0f3460}
#bar input{flex:1;padding:10px 14px;border:none;border-radius:20px;background:#0f3460;color:#fff;font-size:.9em;outline:none}
#bar button{width:38px;height:38px;border:none;border-radius:50%;background:#e94560;color:#fff;font-size:1.1em;cursor:pointer}
#bar button:disabled{opacity:.5}

/* API key 输入页 */
#keypage{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center}
#keypage h2{font-size:1.2em;margin-bottom:8px}
#keypage p{color:#888;margin-bottom:20px;font-size:.9em}
#keypage input{width:100%;max-width:350px;padding:12px 16px;border:none;border-radius:8px;background:#0f3460;color:#fff;font-size:.9em;text-align:center;margin-bottom:10px}
#keypage button{padding:10px 40px;border:none;border-radius:8px;background:#e94560;color:#fff;font-size:.9em;cursor:pointer}
#keypage .err{color:#e94560;margin-top:8px;font-size:.8em}
</style></head><body>
<header><h1>MetaAgent v5.8</h1><span id="st">加载中...</span></header>

<!-- API key 输入页 -->
<div id="keypage" style="display:none">
  <h2>⚙️ 设置 API Key</h2>
  <p>需要 DeepSeek API Key 才能运行</p>
  <input id="keyin" placeholder="sk-..." autofocus>
  <button onclick="setKey()">确认</button>
  <div class="err" id="kerr"></div>
</div>

<!-- 聊天页 -->
<div id="main" style="display:none;flex:1;display:flex;flex-direction:column">
  <div id="chat"><div id="empty">说说你想设计什么样的智能体</div></div>
  <div id="bar"><input id="in" placeholder="输入..." autofocus><button id="btn" onclick="S()">↑</button></div>
</div>

<script>
let session = null;

window.setKey = async () => {
  const key = document.getElementById('keyin').value.trim();
  if (!key.startsWith('sk-')) { document.getElementById('kerr').textContent='格式不对，应以 sk- 开头'; return; }
  document.getElementById('kerr').textContent = '';
  const r = await fetch('/set-key', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key}) });
  if (!r.ok) { const d = await r.json(); document.getElementById('kerr').textContent = d.error; return; }
  await startAgent();
};

async function startAgent() {
  const r = await fetch('/start', { method:'POST' });
  if (!r.ok) { document.getElementById('st').textContent='启动失败'; return; }
  const d = await r.json();
  document.getElementById('keypage').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
  addMsg('a', '', d.message);
  session = d.sessionId;
  document.getElementById('st').textContent = '就绪';
}

function addMsg(role, label, text){
  document.getElementById('empty')?.remove();
  const c=document.getElementById('chat'), d=document.createElement('div');
  d.className='m '+role; d.innerHTML='<div class=b>'+(label?`<div class=l>${label}</div>`:'')+text.replace(/\n/g,'<br>')+'</div>';
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}

window.S = async () => {
  const el=document.getElementById('in'), t=el.value.trim(); if(!t||!session)return; el.value='';
  const btn=document.getElementById('btn'); btn.disabled=true; document.getElementById('st').textContent='处理中...';
  addMsg('u','',t);
  try{
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:t,sessionId:session})});
    const d=await r.json();
    if(d.error){addMsg('a','错误',d.error)}
    else{addMsg('a',d.state+' '+d.intent,d.content)}
    document.getElementById('st').textContent=d.state||'就绪';
  }catch(e){addMsg('a','','连接失败: '+e.message)}
  btn.disabled=false;el.focus();
};
document.getElementById('in').addEventListener('keydown', e => { if(e.key==='Enter') S(); });

// 启动：检测 key 状态
(async () => {
  const r = await fetch('/status');
  const s = await r.json();
  if (s.hasKey) { await startAgent(); }
  else {
    document.getElementById('keypage').style.display = 'flex';
    document.getElementById('st').textContent = '需要 API key';
  }
  document.getElementById('keyin').addEventListener('keydown', e => { if(e.key==='Enter') setKey(); });
})();
</script></body></html>
