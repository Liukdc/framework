// MetaAgent v5.8 — chat.html
// Web 聊天界面，零依赖，通过 fetch 与 server.js 通信
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MetaAgent v5.8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#1a1a2e;color:#eee;height:100dvh;display:flex;flex-direction:column;max-width:600px;margin:0 auto}
header{background:#16213e;padding:10px 16px;border-bottom:1px solid #0f3460;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1em;color:#e94560}
header span{font-size:.75em;color:#888}
#chat{flex:1;overflow-y:auto;padding:12px}
.m{display:flex;margin:6px 0}
.m.u{justify-content:flex-end}
.m .b{padding:9px 12px;border-radius:12px;max-width:85%;line-height:1.4;font-size:.9em}
.m.u .b{background:#e94560;color:#fff;border-bottom-right-radius:4px}
.m.a .b{background:#0f3460;border-bottom-left-radius:4px}
.m .l{font-size:.65em;color:#aaa;margin-bottom:2px}
#bar{display:flex;padding:8px;gap:6px;background:#16213e;border-top:1px solid #0f3460}
#bar input{flex:1;padding:10px 14px;border:none;border-radius:20px;background:#0f3460;color:#fff;font-size:.9em;outline:none}
#bar button{width:38px;height:38px;border:none;border-radius:50%;background:#e94560;color:#fff;font-size:1.1em;cursor:pointer}
#bar button:disabled{opacity:.5}
#empty{text-align:center;color:#555;padding:30px 0;font-size:.9em}
</style></head><body>
<header><h1>MetaAgent v5.8</h1><span id="st">就绪</span></header>
<div id="chat"><div id="empty">说说你想设计什么样的智能体</div></div>
<div id="bar"><input id="in" placeholder="输入..." autofocus><button id="btn" onclick="S()">↑</button></div>
<script>
let session = null;
async function init(){
  const r = await fetch('/start', { method: 'POST' });
  if(!r.ok){ document.getElementById('st').textContent='服务未启动'; return; }
  const d = await r.json();
  addMsg('a','',d.message);
  session = d.sessionId;
}
function addMsg(role,label,text){
  document.getElementById('empty')?.remove();
  const c=document.getElementById('chat'),d=document.createElement('div');
  d.className='m '+role;d.innerHTML='<div class=b>'+(label?`<div class=l>${label}</div>`:'')+text.replace(/\n/g,'<br>')+'</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
window.S=async()=>{
  const el=document.getElementById('in'),t=el.value.trim();if(!t||!session)return;el.value='';
  const btn=document.getElementById('btn');btn.disabled=true;document.getElementById('st').textContent='处理中...';
  addMsg('u','',t);
  try{
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:t,sessionId:session})});
    const d=await r.json();
    if(d.error){addMsg('a','错误',d.error);}
    else{addMsg('a',d.state+' '+d.intent,d.content);}
    document.getElementById('st').textContent=d.state||'就绪';
  }catch(e){addMsg('a','','连接失败: '+e.message)}
  btn.disabled=false;el.focus();
};
document.getElementById('in').addEventListener('keydown',e=>{if(e.key=='Enter')S()});
init();
</script></body></html>
