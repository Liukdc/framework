<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>富贵小安</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui;background:#1a1a2e;color:#eee;height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto}header{background:#16213e;padding:12px 16px;border-bottom:1px solid #0f3460;text-align:center}h1{font-size:1em;color:#e94560}#chat{flex:1;overflow-y:auto;padding:12px}.m{display:flex;margin:8px 0}.m.u{justify-content:flex-end}.m .b{padding:10px 14px;border-radius:12px;max-width:80%;word-break:break-word;line-height:1.5}.m.u .b{background:#e94560;color:#fff}.m.a .b{background:#0f3460}.m .l{font-size:.65em;color:#888;margin-bottom:3px}#bar{display:flex;padding:10px;gap:8px;background:#16213e}#bar input{flex:1;padding:10px 14px;border:none;border-radius:20px;background:#0f3460;color:#fff;font-size:.95em;outline:none}#bar button{width:40px;height:40px;border:none;border-radius:50%;background:#e94560;color:#fff;font-size:1.2em;cursor:pointer}#empty{text-align:center;color:#555;padding:40px 0}</style></head><body>
<header><h1>🐱 富贵小安</h1></header>
<div id="chat"><div id="empty">语音记账助手 · 说"午饭 25 块"试试</div></div>
<div id="bar"><input id="in" placeholder="记账/查询..." autofocus><button onclick="S()">↑</button></div>

<script>
// 本地存储
const DB = {
  get(k){try{return JSON.parse(localStorage.getItem('fx_'+k))}catch{return null}},
  set(k,v){localStorage.setItem('fx_'+k,JSON.stringify(v))},
  all(){return this.get('records')||[]},
  add(r){const a=this.all();a.push(r);this.set('records',a);return a},
  summary(){const r=this.all();return{count:r.length,total:r.reduce((s,x)=>s+x.amount,0)}}
};

// 本地语义分析（无 API 时用）
function analyze(input){
  const t=input.replace(/[零一二两三四五六七八九十百]/g,m=>({零:0,一:1,二:2,两:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10}[m]||m));
  const amt=t.match(/(\d+(\.\d+)?)\s*[块元]/),qty=t.match(/(\d+)\s*[个只份件袋杯]/);
  if(!amt&&!qty){if(t.includes('月')||t.includes('花了')||t.includes('多少'))return{intent:'query'};return{intent:'other'}}
  if(t.includes('月')||t.includes('花了')||t.includes('多少'))return{intent:'query'};
  if(t.includes('删除')||t.includes('删了'))return{intent:'delete'};
  const n=amt?parseFloat(amt[1]):parseInt(qty[1]);
  const cat=t.includes('饭')||t.includes('午')||t.includes('晚')?'餐饮':t.includes('打车')||t.includes('地铁')?'交通':t.includes('猫')||t.includes('狗')?'宠物':t.includes('衣')||t.includes('鞋')?'购物':'其他';
  return{intent:'record',amount:n,cat,note:t.replace(/[\d块元个只份件袋杯]+/g,'').trim()};
}

async function chat(input){
  const key=localStorage.getItem('fx_key')||'';
  if(key){
    const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:'你是记账助手"富贵小安"。用户输入一句话，你识别意图：记账(record)/查询(query)/删除(delete)/其他(other)。记账时从输入中提取金额和类别，回复"已记录 ✅ [类别] [备注] — ¥[金额]"。查询时回复"📊 共N笔，合计¥X"。严禁编造金额。'},{role:'user',content:input}],max_tokens:200})});
    const j=await resp.json();
    return{intent:'llm',content:j.choices?.[0]?.message?.content||'...'};
  }
  const r=analyze(input);
  if(r.intent==='record'){DB.add({amount:r.amount,cat:r.cat,note:r.note,time:Date.now()});return{intent:'record',content:'已记录 ✅ '+r.cat+' '+r.note+' — ¥'+r.amount}}
  if(r.intent==='query'){const s=DB.summary();return{intent:'query',content:'📊 共 '+s.count+' 笔，合计 ¥'+s.total.toFixed(2)}}
  if(r.intent==='delete'){const a=DB.all();if(a.length){a.pop();DB.set('records',a);return{intent:'delete',content:'已删除最近一笔 ✅'}}return{intent:'delete',content:'无记录'}}
  return{intent:'other',content:'我是记账助手。试试说"午饭 25 块"记账，"这个月花了多少"查询。'}
}

window.S=async()=>{
  const el=document.getElementById('in'),t=el.value.trim();if(!t)return;el.value='';
  document.getElementById('empty')?.remove();
  const c=document.getElementById('chat');
  let d=document.createElement('div');d.className='m u';d.innerHTML='<div class=b>'+t+'</div>';c.appendChild(d);
  const r=await chat(t);
  d=document.createElement('div');d.className='m a';
  d.innerHTML='<div class=b><div class=l>['+r.intent+']</div>'+r.content.replace(/\n/g,'<br>')+'</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
};
document.getElementById('in').addEventListener('keydown',e=>{if(e.key==='Enter')S()});
</script></body></html>
