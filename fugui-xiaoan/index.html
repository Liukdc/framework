<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a1a2e">
<title>富贵小安</title>
<link rel="manifest" href="data:application/json,{'name':'富贵小安','short_name':'小安','start_url':'.','display':'standalone','background_color':'#1a1a2e','theme_color':'#1a1a2e','icons':[{'src':'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>','sizes':'100x100','type':'image/svg+xml'}]}">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#1a1a2e;color:#eee;height:100dvh;display:flex;flex-direction:column;max-width:500px;margin:0 auto}
header{background:#16213e;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #0f3460}
header h1{font-size:1.1em;color:#e94560}
#chat{flex:1;overflow-y:auto;padding:12px}
.msg{display:flex;margin:8px 0}
.msg.u{justify-content:flex-end}
.msg .b{padding:10px 14px;border-radius:12px;max-width:80%;word-break:break-word;line-height:1.5}
.msg.u .b{background:#e94560;color:#fff;border-bottom-right-radius:4px}
.msg.a .b{background:#0f3460;border-bottom-left-radius:4px}
.msg .l{font-size:.65em;color:#888;margin-bottom:3px}
#bar{display:flex;padding:10px;gap:8px;background:#16213e;border-top:1px solid #0f3460}
#bar input{flex:1;padding:10px 14px;border:none;border-radius:20px;background:#0f3460;color:#fff;font-size:.95em;outline:none}
#bar button{width:40px;height:40px;border:none;border-radius:50%;background:#e94560;color:#fff;font-size:1.2em;cursor:pointer;flex-shrink:0}
#bar button:hover{background:#c73652}
#empty{text-align:center;color:#555;padding:40px 0;font-size:.9em}
</style>
</head>
<body>
<header><h1>🐱 富贵小安</h1></header>
<div id="chat"><div id="empty">语音记账助手 · 说"午饭 25 块"试试</div></div>
<div id="bar">
  <input id="in" placeholder="记账/查询..." autofocus>
  <button onclick="send()">↑</button>
</div>

<script type="module">
// ═══ 本地存储 ═══
const DB = {
  get(k) { try { return JSON.parse(localStorage.getItem('fx_'+k)); } catch { return null; } },
  set(k,v) { localStorage.setItem('fx_'+k, JSON.stringify(v)); },
  add(key, item) { const a = this.get(key)||[]; a.push(item); this.set(key, a); return a; },
};

const record = (amount, cat, note) => DB.add('records', { amount, cat: cat||'其他', note: note||'', time: Date.now() });
const records = () => DB.get('records') || [];
const summary = () => { const r=records(); return { count:r.length, total:r.reduce((s,x)=>s+x.amount,0) }; };

// ═══ DeepSeek 适配（有 key 用真模型，无则本地逻辑） ═══
const KEY = localStorage.getItem('fx_apikey') || '';
const BASE = 'https://api.deepseek.com/v1';

async function analyze(input) {
  const t = input.trim().replace(/[零一二两三四五六七八九十百千万亿]+/g, m => ({零:0,一:1,二:2,两:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10,百:100,千:1000,万:10000,亿:100000000}[m]||m));
  const amt = t.match(/(\d+(\.\d+)?)\s*[块元]/); 
  const qty = t.match(/(\d+)\s*[个只份件袋杯]/);

  if (amt || qty) {
    const n = amt ? parseFloat(amt[1]) : parseInt(qty[1]);
    if (t.includes('月')||t.includes('花了')||t.includes('多少')||t.includes('汇总')) {
      return { intent:'query', data:{} };
    }
    if (t.includes('删除')||t.includes('删了')) return { intent:'delete', data:{} };
    const cat = t.includes('饭')||t.includes('午')||t.includes('晚')||t.includes('早')?'餐饮' : t.includes('打车')||t.includes('地铁')||t.includes('公交')?'交通' : t.includes('猫')||t.includes('狗')?'宠物' : t.includes('水')||t.includes('电')||t.includes('煤气')||t.includes('网')?'居住' : t.includes('衣')||t.includes('鞋')?'购物' : '其他';
    return { intent:'record', data:{ amount:n, cat, note:input.replace(/[\d块元个只份件袋杯]+/g,'').trim()||'' } };
  }
  if (t.includes('月')||t.includes('花了')||t.includes('多少')||t.includes('汇总')) return { intent:'query', data:{} };
  return { intent:'other', data:{} };
}

async function chat(input) {
  if (KEY) {
    const resp = await fetch(BASE+'/chat/completions', {
      method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},
      body:JSON.stringify({model:'deepseek-chat', messages:[
        {role:'system',content:'你是记账助手"富贵小安"。用户输入收到后直接记账：识别金额和类别，回复"已记录 ✅ [类别] [备注] — ¥[金额]"。金额只能从用户输入中提取数字，严禁编造。查询时只做汇总，不编造记录。输出用中文。'},
        {role:'user',content:input}
      ], max_tokens:200})
    });
    const j = await resp.json();
    return { intent:'llm', content:j.choices?.[0]?.message?.content||'...' };
  }
  const r = analyze(input);
  if (r.intent === 'record') {
    record(r.data.amount, r.data.cat, r.data.note);
    return { intent:'record', content:`已记录 ✅ ${r.data.cat} ${r.data.note} — ¥${r.data.amount}` };
  }
  if (r.intent === 'query') {
    const s = summary();
    return { intent:'query', content:`📊 共 ${s.count} 笔记录，合计 ¥${s.total.toFixed(2)}` };
  }
  if (r.intent === 'delete') {
    const all = records();
    if (all.length) { all.pop(); DB.set('records', all); return { intent:'delete', content:'已删除最近一笔 ✅' }; }
    return { intent:'delete', content:'没有记录可删除' };
  }
  return { intent:'other', content:'我是记账助手。试试说"午饭 25 块"来记账，或者"这个月花了多少"来查询。' };
}

// ═══ UI ═══
window.send = async () => {
  const el = document.getElementById('in'), input = el.value.trim();
  if (!input) return; el.value = '';
  const c = document.getElementById('chat');
  document.getElementById('empty')?.remove();
  addMsg('u', '', input);
  const r = await chat(input);
  addMsg('a', r.intent, r.content);
};

function addMsg(role, intent, text) {
  const c = document.getElementById('chat');
  const d = document.createElement('div'); d.className = 'msg '+role;
  const b = document.createElement('div'); b.className = 'b';
  if (intent) b.innerHTML = '<div class="l">['+intent+']</div>'+text.replace(/\n/g,'<br>');
  else b.textContent = text;
  d.appendChild(b); c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

document.getElementById('in').addEventListener('keydown', e => { if (e.key==='Enter') send(); });

// 管理 API key
window.setKey = k => { localStorage.setItem('fx_apikey',k); location.reload(); };
</script>
</body>
</html>
